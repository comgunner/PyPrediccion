name: 🏗️ Build & Test - PyPrediccionBybit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python ──────────────────────────
      - name: ⚙️ Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Install Dependencies ──────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt

      # ── Syntax Check ──────────────────────────
      - name: 🔍 Check Python syntax
        run: |
          python -m py_compile app_principal.py
          python -m py_compile bybit_api.py
          python -m py_compile analizador_datos.py
          python -m py_compile visualizaciones.py

      # ── Import Check ──────────────────────────
      - name: ✅ Verify imports work
        run: |
          python -c "from bybit_api import BybitAPI; print('API module OK')"
          python -c "from analizador_datos import AnalizadorDatos; print('Analyzer module OK')"
          python -c "from visualizaciones import Visualizador; print('Visualizer module OK')"
          python -c "import app_principal; print('Main module OK')"

      # ── Pre-commit Check ──────────────────────
      - name: 🔎 Run pre-commit checks
        run: |
          pip install pre-commit ruff
          pre-commit run --all-files || true
        continue-on-error: true
