name: 🔍 Code Quality & Linting - PyPrediccionBybit

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  lint:
    name: 🔎 Lint Python Code
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python ──────────────────────────
      - name: ⚙️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Install Linters ───────────────────────
      - name: 📦 Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pre-commit

      # ── Pre-commit ────────────────────────────
      - name: 🔍 Run pre-commit
        run: |
          pre-commit run --all-files
        continue-on-error: true

      # ── Ruff Lint ─────────────────────────────
      - name: 🔍 Run Ruff
        run: |
          ruff check .
        continue-on-error: true

  security:
    name: 🔒 Security Check
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python ──────────────────────────
      - name: ⚙️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Install Safety ────────────────────────
      - name: 📦 Install safety
        run: |
          pip install safety

      # ── Check Dependencies ────────────────────
      - name: 🔒 Check dependencies for vulnerabilities
        run: |
          safety check -r requirements.txt
        continue-on-error: true
